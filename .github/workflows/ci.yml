name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Lint, vérification des types et tests unitaires.
  quality:
    name: Qualité (lint, typecheck, tests)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de pnpm
        uses: pnpm/action-setup@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Vérification des types
        run: pnpm exec tsc --noEmit

      - name: Tests unitaires
        run: pnpm test

  # Build de production Next.js. Ne dépend pas de secrets : les variables NEXT_PUBLIC_*
  # ont un fallback en code, donc le build passe même si les repo variables sont vides.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de pnpm
        uses: pnpm/action-setup@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile

      - name: Build Next.js
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_WHATSAPP_NUMBER: ${{ vars.NEXT_PUBLIC_WHATSAPP_NUMBER }}
          NEXT_PUBLIC_CONTACT_EMAIL: ${{ vars.NEXT_PUBLIC_CONTACT_EMAIL }}

  # Tests end-to-end Playwright. Non bloquant : un échec ici ne fait pas échouer le workflow.
  e2e:
    name: E2E (non bloquant)
    runs-on: ubuntu-latest
    needs: quality
    continue-on-error: true
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4

      - name: Installation de pnpm
        uses: pnpm/action-setup@v4

      - name: Installation de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Installation des dépendances
        run: pnpm install --frozen-lockfile

      - name: Installation de Playwright (Chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: Tests end-to-end
        run: pnpm exec playwright test

      - name: Publication du rapport Playwright
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
